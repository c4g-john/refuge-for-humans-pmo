name: status dashboard

# Publishes the derived status site (portfolio index + a page per project) to
# GitHub Pages on every push to main.
#
# One-time setup, then the job runs:
#   1. Settings → Pages → Source: GitHub Actions
#   2. Settings → Secrets and variables → Actions → Variables →
#      new repository variable DOCASSERT_PAGES = true
# (The variable gate keeps fresh copies of this template green instead of
# failing on the deploy until Pages is enabled.)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    if: vars.DOCASSERT_PAGES == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: c4g-john/docassert-action@v1
        with:
          command: pages
          extras: ''
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
